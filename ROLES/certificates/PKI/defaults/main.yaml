---
# Folders
project_folder: ca              
root_ca_folder: root-ca         # Also used for root .csr & .key name
root_ca_public_folder: public
root_ca_private_folder: private
storage_path: storage           # It can be a database, or something else
crl_folder: crl                 # Considering keeping that like it is
certs_folder: certs

# Paths
csr_path: "{{ project_folder }}/{{ root_ca_folder }}.csr"
privatekey_path: "{{ project_folder }}/{{ root_ca_folder }}/{{ root_ca_private_folder }}"
ca_config_path: "{{ project_folder }}/config"

# Configs 
config_name: example.conf               # Required, used in include_template.yaml

# DNS & IPs
dns_list: none                  # Required
ip_list: none                   # Required
...
