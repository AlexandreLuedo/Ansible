---
- name: Setup folders
  include_role:
    name: "{{ role }}"
    tasks_from: setup_folders

- name: Setup nginx container
  include_role:
    name: "{{ role }}"
    tasks_from: setup_nginx_docker

- name: "Setup the CAs"
  include_role:
    name: "{{ role }}"
    tasks_from: "setup_{{ item }}_ca"
  loop: "{{ ca }}"

- name: Deploy the certs
  include_role:
    name: "{{ role }}"
    tasks_from: generate_certs

- name: fetch the root-ca
  ansible.builtin.fetch:
    src: "/root/pki/ca/root-ca/root-ca.crt"
    dest: "~/pki_certs/"
    flat: true

- name: List all the certs # Generated by gemini - modify by me
  ansible.builtin.find:
    paths: "/root/pki/certs/"
    patterns: "*"
  register: certs_list

- name: Assemble certs
  include_role:
    name: "{{ role }}"
    tasks_from: generate_certs

- name: Fetch all the certificates
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "~/INFOR/PKI_CERTS/CERTS/"
    flat: true
  loop: "{{ certs_list.files }}"
...
