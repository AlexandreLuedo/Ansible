---
- name: Create a full PKI, root-ca, tls-ca, tls-certs
  hosts: serv3
  become: true
  roles:
    - New_PKI
  vars:
    # ROLES VARS => defaults/main.yaml
    organization_name: "My cloud"
    country_name: FR
    ca:
      - root
      - tls
    domains:
      - main.cloud
      - serv1.idrac.cloud
      - serv2.idrac.cloud
      - serv3.idrac.cloud
      - umbrel.local
