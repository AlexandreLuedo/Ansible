---
- name: Create a full PKI, root-ca, tls-ca, tls-certs
  hosts: serv3
  become: true
  vars:
    role: New_PKI
    ca:
      - root
      - tls
    domains:
      - main.cloud
      - serv1.idrac.cloud
      - serv2.idrac.cloud
      - serv3.idrac.cloud
      - umbrel.local

  tasks:
    - name: Setup folders
      include_role:
        name: "{{ role }}"
        tasks_from: setup_folders

    - name: Setup nginx container
      include_role:
        name: "{{ role }}"
        tasks_from: setup_nginx_docker

    - name: "Setup the CAs"
      include_role:
        name: "{{ role }}"
        tasks_from: "setup_{{ item }}_ca"
      loop: "{{ ca }}"  # On boucle sur la liste 'ca' définie plus haut

    - name: Deploy the certs
      include_role:
        name: "{{ role }}"
        tasks_from: generate_certs

    - name: fetch the root-ca
      ansible.builtin.fetch:
        src: "/root/pki/ca/root-ca/root-ca.crt"
        dest: "~/pki_certs/"
        flat: true


      # Generated by gemini
    - name: List all the certs
      ansible.builtin.find:
        paths: "/root/pki/certs/"
        patterns: "*.crt"
      register: certs_list

    - name: Fetch all the certificates
      ansible.builtin.fetch:
        src: "{{ item.path }}"
        dest: "~/INFOR/PKI_CERTS/CERTS"
        flat: true
      loop: "{{ certs_list.files }}"
